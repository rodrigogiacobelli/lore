$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "lore://schemas/artifact-frontmatter"
title: Artifact Frontmatter
type: object
additionalProperties: false
required: [id, title, summary]
properties:
  id:
    type: string
    minLength: 1
    description: Artifact id. Must match the filename stem.
  title:
    type: string
    minLength: 1
  summary:
    type: string
    minLength: 1
