id: quick-feature-implementation
title: Quick Feature Implementation
summary: Streamlined spec-driven pipeline from raw user input to implementation-ready user stories — single scout, no crazy phases, one commit at the end
name: quick-feature-implementation
description: >
  Streamlined feature pipeline from raw user input to implementation-ready
  user stories. One scout handles both lenses. No crazy/draft divergence phases.
  Single commit at the end.

  Phase 0 (Scout): One Scout maps the codex from both the business and technical
  perspectives in a single mission. Produces both context maps in transient/.
  All downstream agents receive the relevant map(s) via their board.

  Phase 1 (PRD): PM produces the final PRD directly from user input and context
  maps. User reviews and appends notes. Human Gate before Phase 2.

  Phase 2 (Tech Spec): Architect produces the final Tech Spec directly from the
  PRD and context maps. User reviews and appends notes. Human Gate before Phase 3.

  Phase 3 (Parallel — three tracks):
    BA track: BA drafts and finalizes user stories in one pass.
    Tech-Writer track: Tech Writer applies codex changes directly — no proposal step.
    Tech Lead track (needs BA + Tech-Writer complete): Tech Lead adds tech notes
    to each story in one pass.

  Single commit at the end covering all outputs.

steps:
  # --- Phase 0: Scout ---

  - id: scout
    title: Map codex from both business and technical perspectives
    type: knight
    priority: 0
    knight: feature-implementation/scout.md
    notes: >
      The orchestrator provides the feature request in this mission description.
      Run two passes — one from the BUSINESS lens, one from the TECHNICAL lens.

      Business pass:
      Run `lore codex search <feature-keywords>` to find relevant documents from
      a product, user, and business perspective. Run `lore codex map <most-relevant-id> --depth 1`.
      Run `lore codex chaos <feature-keywords>` to surface loosely related documents
      that structured search may miss — scan the results for any relevant business context.
      Retrieve the template: `lore artifact show fi-context-map`.
      Write to .lore/codex/transient/<feature-slug>-business-map.md with proper
      frontmatter (type: context-map, lens: business).

      Technical pass:
      Run `lore codex search <feature-keywords>` focusing on architecture,
      implementation, and infrastructure. Run `lore codex map <most-relevant-id> --depth 1`.
      Run `lore codex chaos <feature-keywords>` to surface loosely related documents
      that structured search may miss — scan the results for any relevant technical context.
      Retrieve the template: `lore artifact show fi-context-map`.
      Write to .lore/codex/transient/<feature-slug>-technical-map.md with proper
      frontmatter (type: context-map, lens: technical).

      Post board messages to prd, tech-spec, ba-stories, codex-apply, and tech-notes
      with both map codex IDs.
      Mark done.

  # --- Phase 1: PRD ---

  - id: prd
    title: Produce final PRD from user input and context maps
    type: knight
    priority: 1
    needs:
      - scout
    knight: feature-implementation/pm.md
    notes: >
      The orchestrator provides the raw user input in this mission description.
      Read your board to find the business-map and technical-map IDs: `lore show <mission-id>`.
      Read both maps: `lore codex show <business-map-id> <technical-map-id>`.
      Retrieve the template: `lore artifact show fi-prd`.
      User workflows must specify exact user actions and exact system responses.
      Leave the Pre-Architecture Notes section empty — user fills it next.
      Write to .lore/codex/transient/<feature-slug>-prd.md with proper frontmatter.
      Post a board message to prd-gate with the PRD ID.
      Mark done.

  - id: prd-gate
    title: Review PRD — append pre-architecture notes
    type: human
    priority: 1
    needs:
      - prd
    notes: >
      Read the PRD from your board: `lore show <mission-id>`.
      Read it: `lore codex show <prd-id>`.
      Append pre-architecture notes directly to the Pre-Architecture Notes section —
      technical preferences, constraints, priorities, or context for the architect.
      Mark done.

  # --- Phase 2: Tech Spec ---

  - id: tech-spec
    title: Produce final Tech Spec from PRD and context maps
    type: knight
    priority: 2
    needs:
      - prd-gate
    knight: feature-implementation/architect.md
    notes: >
      Read your board to find the PRD ID and technical-map ID: `lore show <mission-id>`.
      Read the PRD including Pre-Architecture Notes: `lore codex show <prd-id>`.
      Read the technical-map: `lore codex show <technical-map-id>`. Read every doc it references.
      Retrieve the template: `lore artifact show fi-tech-spec`.
      Define project structure to file-name level. The Test Strategy must be complete —
      every PRD workflow maps to an E2E scenario.
      Write to .lore/codex/transient/<feature-slug>-tech-spec.md with proper frontmatter.
      Post a board message to tech-spec-gate with the Tech Spec ID and PRD ID.
      Mark done.

  - id: tech-spec-gate
    title: Review Tech Spec — append feedback
    type: human
    priority: 2
    needs:
      - tech-spec
    notes: >
      Read the Tech Spec from your board: `lore show <mission-id>`.
      Read it: `lore codex show <tech-spec-id>`.
      Append your feedback directly to the Tech Spec file — no specific format required.
      Mark done.

  # --- Phase 3: Parallel ---

  - id: ba-stories
    title: Write and finalize User Stories
    type: knight
    priority: 3
    needs:
      - tech-spec-gate
    knight: feature-implementation/ba.md
    notes: >
      Read your board to find the PRD ID, Tech Spec ID, and business-map ID: `lore show <mission-id>`.
      Read the PRD first: `lore codex show <prd-id>`. This is your primary source.
      Read the business-map: `lore codex show <business-map-id>`. Read the docs it references.
      Read the Tech Spec: `lore codex show <tech-spec-id>`.
      Retrieve templates: `lore artifact show fi-user-story` and `lore artifact show fi-user-story-index`.
      Write one file per story: .lore/codex/transient/<feature-slug>-us-{number}.md
      Write the index: .lore/codex/transient/<feature-slug>-us-index.md
      E2E scenarios must specify exact user actions and exact expected outputs.
      Verify each story: every acceptance criterion must be testable. Update Status to final.
      Post all story IDs and the index ID to the tech-notes board.
      Mark done.

  - id: codex-apply
    title: Apply codex changes directly from Tech Spec and PRD
    type: knight
    priority: 3
    needs:
      - tech-spec-gate
    knight: feature-implementation/tech-writer.md
    notes: >
      Read your board to find the PRD ID, Tech Spec ID, business-map ID, and technical-map ID:
      `lore show <mission-id>`.
      Read the PRD: `lore codex show <prd-id>`.
      Read both context maps and the docs they reference.
      Read the Tech Spec: `lore codex show <tech-spec-id>`.
      Identify every codex document to create, update, or retire based on the feature.
      Apply changes directly — no proposal step. Create new documents, update existing ones,
      retire obsolete ones using `lore artifact list` for templates.
      Post a board message to tech-notes listing all codex document IDs
      created, updated, or retired — by codex ID only, never by file path.
      Mark done.

  - id: tech-notes
    title: Add tech notes to each user story
    type: knight
    priority: 3
    needs:
      - ba-stories
      - codex-apply
    knight: feature-implementation/tech-lead.md
    notes: >
      Read your board to find all story IDs, PRD ID, Tech Spec ID, technical-map ID,
      and updated codex IDs: `lore show <mission-id>`.
      Read the PRD first: `lore codex show <prd-id>`.
      Read the technical-map: `lore codex show <technical-map-id>`. Read the docs it references.
      Read the Tech Spec and updated codex docs.
      Read every user story.
      For each story, fill the Tech Notes section:
        - Implementation Approach with verified file paths from src/
        - Test File Locations following Tech Spec conventions
        - Test Stubs: one stub per acceptance criterion scenario — no exceptions.
          Every stub must cite its source workflow codex ID in a comment.
        - Complexity Estimate
      Verify every file path exists in src/ or matches the Tech Spec structure.
      Verify every codex reference is a valid codex ID.
      Post a board message to the quest board confirming pipeline complete,
      listing all final story IDs and the index ID.
      Mark done.

  # --- Final Commit ---

  - id: commit
    title: Commit all pipeline outputs
    type: constable
    priority: 4
    needs:
      - tech-notes
    notes: >
      Commit all pipeline outputs in a single commit.
      Message: "feat(<feature-slug>): PRD, tech spec, user stories, codex updates"
