id: tdd-implementation
steps:
  - id: red
    title: Write failing tests for every acceptance criterion
    priority: 0
    type: knight
    knight: tdd-red.md
    notes: |
      Your mission description contains the user story codex ID.
      Read the user story in full: `lore codex show <story-id>`
      Pay close attention to the Acceptance Criteria section — it is your complete test specification.

      Read existing tests in `tests/` to understand conventions, fixtures, and naming patterns.
      Read source code in `src/lore/` for import paths.
      If the Tech Notes reference a concept or behavior that needs clarification,
      consult the relevant codex document: `lore codex show <id>`

      For each acceptance criterion scenario in the story:
      - Write one or more test functions in `tests/` following existing naming conventions
      - E2E scenarios map to integration tests; unit test scenarios map to unit tests
      - Test names must describe expected behavior (e.g., `test_edit_quest_updates_title`)
      - Reference exact inputs and outputs from the acceptance criteria — do not generalize
      - Mock external dependencies; never rely on real I/O unless it is SQLite in-memory
      - One concept per test function

      Run after writing every test file: `uv run pytest <test-file>`
      Every test MUST fail before you mark done.
      If a test passes immediately, it is not testing new behavior — remove or fix it.
      Import failures count as red.

      No production code — not even stubs or empty functions.

      Before marking done — wiring and coverage check:
      Read the Tech Spec file structure section. For every file listed as modified or created:
      - Verify at least one test covers its primary behavior.
      - For files that assemble child components (page, container, layout, view): verify a test
        exists asserting the file renders those child components under the correct conditions.
        The user story test scenarios are a minimum floor — if the acceptance criteria does not
        list this test explicitly, write it anyway.
      If any listed file has no test, write one. Do not mark done with an untested file.

      Mark done: `lore done <mission-id>`

  - id: green
    title: Write minimum production code to pass all tests
    priority: 0
    type: knight
    needs: [red]
    knight: tdd-green.md
    notes: |
      Your mission description contains the user story codex ID.
      Read the user story and its Tech Notes: `lore codex show <story-id>`
      The Tech Notes section contains Implementation Approach and Test File Locations —
      use these to know which files to modify and how to approach the implementation.

      Read all failing tests first — they define exactly what the code must do.
      Read source code in `src/lore/` for context and conventions.

      Write the simplest code in `src/lore/` that makes each failing test pass:
      - Modify only the files identified in Tech Notes unless a test requires otherwise
      - Follow existing code conventions in `src/lore/`
      - Prefer inline solutions over abstractions
      - If a test expects a specific error message, match it exactly
      - No error handling beyond what tests require
      - No features or code paths not covered by a test

      Run the full test suite after each change: `uv run pytest`
      Do not mark done until all tests pass.

      Do not modify test files — tests are the specification.
      Do not refactor or clean up — that is the next step.

      Before marking done — runner check:
      If the project uses a grep-filtered or project-based test runner (e.g., Playwright):
      verify every E2E test file written by Red is matched by at least one runner project config.
      A test file that runs but is silently skipped is a blocker — surface it before marking done.

      Mark done: `lore done <mission-id>`

  - id: refactor
    title: Refactor with quality checks
    priority: 0
    type: knight
    needs: [green]
    knight: tdd-refactor.md
    notes: |
      Your mission description contains the user story codex ID.
      Read the user story to understand the scope of what was implemented: `lore codex show <story-id>`

      Review production code in `src/lore/` and test code in `tests/` for:

      Production code:
      - Naming: is it clear and consistent with the existing codebase?
      - Duplication: extract helpers only for genuine duplication across 3+ instances
      - Single responsibility: each function does one thing
      - Dead code: remove anything introduced during green that is not needed

      Test code:
      - Test names describe expected behavior
      - Assertions are clear and specific
      - Remove unnecessary mocks

      Run quality checks in order after every change:
        uv run pytest                          (all tests must stay green)
        uv run ruff check src/ tests/          (no lint violations)
        type checking if configured
        runner coverage: confirm every test file is reachable by the test runner — for
        grep-filtered runners, every test name must match at least one project pattern;
        a silently skipped test is a defect, not a passing test

      If refactoring breaks a test — revert the refactor immediately.
      No new features or tests beyond what the story requires.
      No over-engineering: three similar lines are better than a premature abstraction.

      Mark done: `lore done <mission-id>`

  - id: commit
    title: Commit changes
    priority: 0
    type: constable
    needs: [refactor]
    notes: |
      Commit the changes to the codebase after refactor.
      Stage only the files affected by this user story — do not include unrelated changes.
      Commit message format: "US-xxx: {user story title}"
      where xxx is the story number and the title comes from the story's frontmatter.
